<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ma-zyan</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07100d;
        color: #f7f2df;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 0%, rgba(245, 196, 91, 0.22), transparent 34%),
          radial-gradient(circle at 80% 20%, rgba(53, 176, 129, 0.2), transparent 38%),
          linear-gradient(145deg, #07100d, #10251d 48%, #06100d);
      }
      main {
        width: min(760px, calc(100% - 32px));
        padding: 36px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }
      p.label {
        color: #f4d47c;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-size: 13px;
        margin: 0 0 12px;
      }
      h1 {
        font-size: clamp(48px, 10vw, 96px);
        line-height: 0.9;
        margin: 0 0 18px;
      }
      p {
        color: rgba(247, 242, 223, 0.78);
        line-height: 1.8;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        padding: 13px 18px;
        border-radius: 14px;
        background: linear-gradient(180deg, #ffe08a, #d7a937);
        color: #18130a;
        font-weight: 800;
        text-decoration: none;
      }
      code {
        background: rgba(0,0,0,.24);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">Online Japanese Mahjong</p>
      <h1>ma-zyan</h1>
      <p>
        このリポジトリは、Renderで動かすWebSocketサーバーと、GitHub Pagesで公開するフロントエンドに分かれています。
      </p>
      <p>
        実際のWebアプリ本体は <code>frontend/index.html</code> と <code>frontend/src/main.ts</code> からビルドされます。
      </p>
      <a href="./frontend/index.html">frontend/index.html を見る</a>
    </main>
  </body>
</html>
